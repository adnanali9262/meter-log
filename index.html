<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Meter Log</title>
<meta name="description" content="Track Meter 1 and Meter 2 readings and see usage per 24 hours, even with irregular entries." />

<!-- PWA -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0B0D0F" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Meter Log" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="icon" href="icons/icon-192.png" />

<style>
  @font-face {
    font-family: 'JetBrains Mono';
    src: local('JetBrains Mono');
  }
  :root {
    --bg: #0B0D0F;
    --panel: #13161A;
    --panel-grad: #161A1F;
    --border: #23272E;
    --border-soft: #1A1D22;
    --text: #E6E8EB;
    --text-dim: #C8CCD2;
    --text-mute: #8A8F98;
    --text-faint: #6B7078;
    --text-ghost: #4A4F58;
    --accent1: #3DD6C4;
    --accent2: #F2C14E;
    --danger: #E0664A;
    --danger-bg: #2A1A1A;
    --danger-border: #5A2E2E;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); }
  body {
    font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    color: var(--text);
    background-image: radial-gradient(circle at 1px 1px, #16191E 1px, transparent 0);
    background-size: 24px 24px;
    min-height: 100vh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    overscroll-behavior-y: contain;
  }
  input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2A2F37; border-radius: 3px; }
  button { font-family: inherit; }
  .container { max-width: 980px; margin: 0 auto; padding: 28px 16px 48px; }
  .eyebrow { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .eyebrow svg { flex-shrink: 0; }
  .eyebrow span { font-size: 12px; letter-spacing: 0.18em; color: var(--text-faint); text-transform: uppercase; }
  h1 { font-size: 22px; font-weight: 700; margin: 4px 0 4px; letter-spacing: -0.01em; }
  .subtitle { font-size: 12px; color: var(--text-faint); margin: 0 0 22px; line-height: 1.5; }
  .banner {
    margin-bottom: 16px; padding: 10px 14px; border-radius: 4px;
    font-size: 12px; display: flex; align-items: center; gap: 8px;
  }
  .banner.danger { background: var(--danger-bg); border: 1px solid var(--danger-border); color: var(--danger); }
  .banner.info { background: #15201F; border: 1px solid #234A40; color: var(--accent1); }

  .meters-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
  @media (min-width: 860px) {
    .meters-grid { grid-template-columns: 1fr 1fr; }
  }

  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, var(--panel-grad) 0%, var(--panel) 100%);
  }
  .panel-header-left { display: flex; align-items: center; gap: 10px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .panel-label { font-size: 13px; letter-spacing: 0.08em; color: var(--text); text-transform: uppercase; font-weight: 600; }
  .panel-reading { display: flex; align-items: baseline; gap: 6px; }
  .panel-reading .val { font-size: 20px; font-weight: 700; }
  .panel-reading .unit { font-size: 11px; color: var(--text-faint); }

  .tab-row { display: flex; gap: 2px; padding: 10px 16px 0; }
  .tab-btn {
    flex: 1; background: transparent; border: none; border-bottom: 2px solid transparent;
    color: var(--text-faint); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 8px 4px; cursor: pointer;
  }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--tab-accent, var(--accent1)); }

  .chart-wrap { padding: 8px 12px 4px 0; height: 220px; position: relative; }
  .empty-state {
    height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--text-ghost); font-size: 12px; gap: 6px; text-align: center; padding: 0 24px;
  }
  .empty-state .pulse { width: 10px; height: 10px; border-radius: 50%; }

  .add-section { padding: 12px 20px 18px; }
  .add-form { display: flex; gap: 8px; }
  .add-form input {
    flex: 1; background: var(--bg); border-radius: 4px; padding: 9px 12px;
    color: var(--text); font-family: inherit; font-size: 14px; outline: none;
  }
  .add-form button.log-btn {
    border: none; border-radius: 4px; padding: 0 16px; font-size: 13px; font-weight: 700; cursor: pointer; color: #0B0D0F;
  }
  .add-form button.cancel-btn {
    background: transparent; border: 1px solid var(--border); border-radius: 4px;
    padding: 0 14px; color: var(--text-faint); font-size: 13px; cursor: pointer;
  }
  .add-trigger {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
    background: transparent; border: 1px dashed #2A2F37; border-radius: 4px; padding: 10px 0;
    color: var(--text-mute); font-size: 13px; cursor: pointer; transition: border-color .15s, color .15s;
  }
  .field-error { margin-top: 8px; display: flex; align-items: center; gap: 6px; color: var(--danger); font-size: 11px; }

  .log-list { border-top: 1px solid var(--border); max-height: 170px; overflow-y: auto; }
  .log-row {
    display: flex; align-items: center; justify-content: space-between; padding: 8px 20px;
    border-bottom: 1px solid var(--border-soft); font-size: 12px;
  }
  .log-row .when { color: var(--text-faint); }
  .log-row .right { display: flex; align-items: center; gap: 10px; }
  .log-row .value { color: var(--text-dim); font-weight: 600; }
  .log-row .rate { color: var(--text-ghost); font-size: 11px; }
  .log-row button.del {
    background: transparent; border: none; color: var(--text-ghost); cursor: pointer; padding: 2px; display: flex;
  }
  .log-row button.del:hover { color: var(--danger); }

  .install-hint {
    margin-top: 24px; padding: 14px 16px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--panel); font-size: 11.5px; color: var(--text-faint); line-height: 1.6;
  }
  .install-hint strong { color: var(--text-dim); }
  .install-banner {
    margin-top: 0; margin-bottom: 16px; padding: 12px 14px; border-radius: 6px;
    background: var(--panel); border: 1px solid var(--accent1); display: flex; align-items: center;
    justify-content: space-between; gap: 12px; font-size: 12px;
  }
  .install-banner button {
    background: var(--accent1); border: none; border-radius: 4px; padding: 7px 14px;
    color: #0B0D0F; font-weight: 700; font-size: 12px; cursor: pointer; white-space: nowrap;
  }

  .tooltip-box {
    background: #13161A; border-radius: 4px; padding: 8px 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    font-size: 11px; pointer-events: none;
  }
  .tooltip-time { color: var(--text-faint); margin-bottom: 2px; }
  .tooltip-val { font-size: 14px; font-weight: 600; }
  .tooltip-sub { color: var(--text-ghost); font-size: 10px; margin-top: 2px; }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.js"></script>
<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(() => {});
    });
  }
</script>
</body>
</html>
